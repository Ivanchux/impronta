<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="100%">

  <!-- fondo -->
  <rect width="1200" height="240" fill="#111d33"/>

  <!-- líneas decorativas superior e inferior -->
  <line x1="48" y1="32"  x2="1152" y2="32"  stroke="#C9A84C" stroke-width="0.8" opacity="0.55"/>
  <line x1="48" y1="208" x2="1152" y2="208" stroke="#C9A84C" stroke-width="0.8" opacity="0.55"/>

  <!-- diamantes en las esquinas -->
  <polygon points="48,32  54,26  60,32  54,38"  fill="#C9A84C" opacity="0.75"/>
  <polygon points="1140,32  1146,26  1152,32  1146,38"  fill="#C9A84C" opacity="0.75"/>
  <polygon points="48,208  54,202  60,208  54,214"  fill="#C9A84C" opacity="0.75"/>
  <polygon points="1140,208  1146,202  1152,208  1146,214"  fill="#C9A84C" opacity="0.75"/>

  <!-- ornamento central superior — línea + diamante + línea -->
  <line x1="520" y1="72" x2="592" y2="72" stroke="#C9A84C" stroke-width="0.7" opacity="0.5"/>
  <polygon points="600,66  607,72  600,78  593,72" fill="#C9A84C" opacity="0.7"/>
  <line x1="608" y1="72" x2="680" y2="72" stroke="#C9A84C" stroke-width="0.7" opacity="0.5"/>

  <!-- título principal -->
  <text
    x="600" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="bold"
    fill="#C9A84C"
    text-anchor="middle"
    letter-spacing="22">IMPRONTA</text>

  <!-- separador inferior bajo el título -->
  <line x1="440" y1="166" x2="570" y2="166" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <polygon points="600,161  606,166  600,171  594,166" fill="#C9A84C" opacity="0.5"/>
  <line x1="630" y1="166" x2="760" y2="166" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>

  <!-- subtítulo -->
  <text
    x="600" y="191"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="13"
    fill="#F5F0E8"
    text-anchor="middle"
    letter-spacing="5"
    opacity="0.65">SERVICIOS GRÁFICOS · IMPRENTA EN MADRID · SIN TIRADA MÍNIMA</text>

</svg>
